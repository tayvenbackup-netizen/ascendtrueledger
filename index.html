<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Ledger Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <link rel="manifest" href="/manifest.json?v=4" />
  <meta name="apple-mobile-web-app-title" content="Ledger">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <style>
    html, body { background: #000 !important; }
    html { min-height: 100dvh; }
    body {
      min-height: 100dvh;
      min-height: 100vh;
      /* Extend background beyond safe areas to cover iOS chin gap */
      padding-bottom: env(safe-area-inset-bottom);
      background: #000 !important;
    }
    /* Paint an extra layer behind everything that extends past safe areas */
    html::before {
      content: "";
      position: fixed;
      top: -100px; left: -100px; right: -100px; bottom: -100px;
      background: #000;
      z-index: -10;
      pointer-events: none;
    }
  </style>
  <link rel="apple-touch-startup-image" href="/assets/ledger.png">
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
  <link rel="preload" as="image" href="/assets/ledger.png" />
  <meta name="description" content="Ledger Wallet">
  <meta property="og:title" content="Ledger Wallet">
  <meta property="og:type" content="website">
</head>
<body>
  <div id="protected-root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
